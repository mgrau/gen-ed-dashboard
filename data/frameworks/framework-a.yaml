id: framework-a
name: "Proposed Framework 2/3"
description: "ODU's proposed general education framework with goal-based distribution requirements."

sections:
  - id: first_year_seminar
    label: "First Year Seminar"
    tags: [fys]
    credits: 3

  - id: foundational
    label: "Foundational Requirements"
    subcategories:
      - id: composition
        label: "Composition"
        tags: [composition]
        credits: 3
      - id: math
        label: "Mathematics"
        tags: [math_foundational]
        credits: 3

  - id: goals
    label: "General Education Goals"
    min_credits: 19
    note: "At least 3 credits in each learning goal. Disciplinary breadth is satisfied by courses already counted toward goals — one course may fulfill both a goal and a breadth area."
    subcategories:
      # Learning goals — courses drawn from the global pool
      - id: inquiry
        label: "Inquiry & Research"
        tags: [goal_inquiry]
        min_credits: 3
      - id: reasoning
        label: "Reasoning & Problem Solving"
        tags: [goal_reasoning]
        min_credits: 3
      - id: communication
        label: "Communication & Expression"
        tags: [goal_communication]
        min_credits: 3
      - id: civic
        label: "Civic Engagement & Social Responsibility"
        tags: [goal_civic]
        min_credits: 3

      # Disciplinary breadth — overlay: checked against courses already in Goals,
      # no additional courses consumed from the global pool.
      - id: disciplinary_breadth
        label: "Disciplinary Breadth"
        overlay: true
        subcategories:
          - id: natural_science
            label: "Natural Science (with Lab)"
            tags: [natural_science]
            min_credits: 4
            min_courses: 1
          - id: arts_humanities
            label: "Fine Arts or Humanities"
            tags: [arts_humanities]
            min_credits: 3
            min_courses: 1
          - id: social_science
            label: "Behavioral or Social Science"
            tags: [social_science]
            min_credits: 3
            min_courses: 1

  - id: capstone
    label: "General Education Capstone"
    tags: [gened_capstone]
    credits: 1

  - id: exploratory
    label: "Exploratory Electives"
    min_credits: 6
    elective: true
    note: "Any courses outside the student's major."
